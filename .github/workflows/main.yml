name: 🛠 Android CI / Build & Release

on:
  push:
    branches: [ master ]
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+' ]
  pull_request:
    branches: [ master ]

# Restrictive default — jobs override only what they need
permissions:
  contents: read

# Cancel in-progress runs on branches/PRs; never cancel tag (release) runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Test (every push + PR)
  # ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Cache pub deps
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: ☕️ Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 📥 Get dependencies
        run: flutter pub get

      - name: ✅ Run tests
        run: flutter test --coverage

  # ─────────────────────────────────────────
  # JOB 2 — Build signed AAB (every push + PR, after tests pass)
  # ─────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Cache pub + Gradle deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
            ${{ runner.os }}-pub-

      - name: ☕️ Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 📥 Get dependencies
        run: flutter pub get

      - name: 🔑 Decode release keystore
        run: echo "${{ secrets.KEYSTORE_CONTENT }}" | base64 --decode > android/app/release.keystore

      - name: 🏗️ Build App Bundle (AAB)
        run: |
          flutter build appbundle --release \
            --build-number=${{ github.run_number }}
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: ✅ Verify AAB signing
        run: jarsigner -verify -verbose -certs build/app/outputs/bundle/release/app-release.aab

      - name: 🧹 Clean up keystore
        if: always()
        run: rm -f android/app/release.keystore

      - name: 📦 Prepare artifacts
        run: |
          mkdir -p artifacts
          cp build/app/outputs/bundle/release/*.aab artifacts/

      - name: ⬆️ Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-release-${{ github.run_number }}
          path: artifacts/
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 3 — Publish (tag pushes only, requires manual approval)
  # ─────────────────────────────────────────
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # environment: release ties this job to a GitHub Environment. Before the job runs,
    # GitHub pauses and notifies required reviewers — no steps execute until someone approves.
    # To configure: repo Settings → Environments → New environment → name it "release"
    # → add Required reviewers (e.g. yourself or a release team) → Save.
    # Without that setup this line is a no-op, so the configuration step is required.
    # Note: reserve "production" for a future Play Store production-track promotion job.
    environment: release
    permissions:
      contents: write              # needed to create GitHub Releases

    steps:
      - name: ⬇️ Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: artifacts/

      - name: 🏷️ Create GitHub Release
        uses: ncipollo/release-action@v1.16.0
        with:
          tag:       ${{ github.ref_name }}
          name:      Release ${{ github.ref_name }}
          artifacts: artifacts/*.aab
          token:     ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Upload to Play Store (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GPLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.exampleapp.flutter_devops_lab
          releaseFiles: artifacts/*.aab
          track: internal
          status: draft
